server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payroll_dw
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dw
  jackson:
    date-format: yyyy-MM-dd
    time-zone: Africa/Tunis

app:
  jwt:
    secret: insaf-jwt-secret-key-change-in-production-must-be-256-bits-long
    expiration-ms: 86400000   # 24 hours

  ml:
    api-url: http://localhost:8000   # Python FastAPI for ML inference

logging:
  level:
    com.insaf: DEBUG
    org.springframework.security: INFO

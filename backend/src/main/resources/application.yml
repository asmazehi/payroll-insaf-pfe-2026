server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payroll_dw}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dw
  jackson:
    date-format: yyyy-MM-dd
    time-zone: Africa/Tunis
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER:asmazehi.insaf@gmail.com}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET:insaf-jwt-secret-key-change-in-production-must-be-256-bits-long}
    expiration-ms: 86400000

  mail:
    from: ${MAIL_USER:asmazehi.insaf@gmail.com}
    from-name: INSAF Payroll Platform

  ml:
    api-url: ${ML_API_URL:http://localhost:8000}

logging:
  level:
    com.insaf: INFO
    org.springframework.security: INFO

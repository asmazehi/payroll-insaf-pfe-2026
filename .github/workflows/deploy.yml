name: CI/CD — INSAF Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Build & lint Angular frontend ────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend
          retention-days: 1

  # ── Job 2: Build Spring Boot backend ────────────────────────────────────────
  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/payroll-1.0.0.jar
          retention-days: 1

  # ── Job 3: Lint Python API & ETL ────────────────────────────────────────────
  python:
    name: Python — Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8 --quiet

      - name: Lint ETL
        run: flake8 etl/ --select=E9,F --extend-ignore=F401,F541 --exclude=__pycache__

      - name: Lint API
        run: flake8 api/ --select=E9,F --extend-ignore=F401,F541 --exclude=__pycache__

      - name: Check ML syntax
        run: python -m py_compile ml/model_forecast.py ml/model_anomaly.py ml/data_loader.py

  # ── Job 4: Validate Docker builds ───────────────────────────────────────────
  docker:
    name: Docker — Validate images
    runs-on: ubuntu-latest
    needs: [frontend, backend, python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML/API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 5: Deploy to VPS ────────────────────────────────────────────────────
  # Requires these GitHub Secrets:
  #   VPS_HOST       — server IP address
  #   VPS_USER       — SSH user (root)
  #   VPS_SSH_KEY    — private SSH key (contents of id_rsa)
  #   PG_PASSWORD    — PostgreSQL password
  #   JWT_SECRET     — Spring Boot JWT secret
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/insaf

            # Pull latest code
            git pull origin main

            # Write environment file
            cat > .env <<EOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.PG_PASSWORD }}
            POSTGRES_DB=payroll_dw
            DB_URL=jdbc:postgresql://postgres:5432/payroll_dw
            DB_USER=postgres
            DB_PASS=${{ secrets.PG_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ML_API_URL=http://ml:8000
            PG_HOST=postgres
            PG_PORT=5432
            PG_DB=payroll_dw
            PG_USER=postgres
            PG_PASSWORD=${{ secrets.PG_PASSWORD }}
            EOF

            # Rebuild and restart changed services
            docker compose up -d --build --remove-orphans

            # Clean up old images
            docker image prune -f

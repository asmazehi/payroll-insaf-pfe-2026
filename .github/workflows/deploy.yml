name: CI/CD — INSAF Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Build & lint Angular frontend ────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend
          retention-days: 1

  # ── Job 2: Build Spring Boot backend ────────────────────────
  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/payroll-1.0.0.jar
          retention-days: 1

  # ── Job 3: Lint Python ETL/ML ────────────────────────────────
  python:
    name: Python — Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8 --quiet

      - name: Lint ETL
        run: flake8 etl/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Lint API
        run: flake8 api/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Check ML syntax
        run: python -m py_compile ml/model_forecast.py ml/model_anomaly.py ml/data_loader.py

  # ── Job 4: Deploy frontend to Vercel (main branch only) ─────
  deploy-frontend:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --yes --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

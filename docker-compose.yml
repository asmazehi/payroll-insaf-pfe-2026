services:
  postgres:
    image: postgres:15
    container_name: postgres-dw
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payroll_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c idle_in_transaction_session_timeout=300000
        -c tcp_keepalives_idle=60
        -c tcp_keepalives_interval=10
        -c tcp_keepalives_count=5
        -c statement_timeout=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroll_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: 388aa867c900e080d0c568f24f317682308b006a71381cc554aa526f884b9274

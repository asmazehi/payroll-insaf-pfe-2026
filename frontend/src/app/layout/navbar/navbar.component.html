<!-- First-login banner: shown to non-admin users who haven't changed their password yet -->
<div class="pwd-banner" *ngIf="auth.needsPasswordChange()" [routerLink]="['/profile']">
  <mat-icon>lock_open</mat-icon>
  <span>Your account was set up by an administrator. <strong>Please change your password</strong> for security.</span>
  <span class="pwd-banner__cta">Go to My Profile →</span>
</div>

<header class="topbar">
  <div class="topbar__left">
    <span class="topbar__bc-section">INSAF</span>
    <span class="topbar__bc-sep">/</span>
    <span class="topbar__bc-page">{{ pageTitle }}</span>
  </div>

  <div class="topbar__right">
    <!-- Language switcher -->
    <div class="lang-switcher">
      <button
        *ngFor="let l of lang.langs"
        class="lang-btn"
        [class.lang-btn--active]="lang.current === l.code"
        (click)="setLang(l.code)">
        {{ l.label }}
      </button>
    </div>

    <div class="topbar__sep"></div>

    <div class="topbar__live">
      <span class="live-dot"></span>
      <span class="live-txt">{{ 'topbar.live' | translate }}</span>
    </div>

    <div class="topbar__sep"></div>

    <!-- Ticket bell (admin only) -->
    <button class="topbar__bell" (click)="goToTickets()" [title]="'Support Tickets'">
      <mat-icon>notifications</mat-icon>
      <span class="bell-badge" *ngIf="openTicketCount > 0">{{ openTicketCount > 99 ? '99+' : openTicketCount }}</span>
    </button>

    <div class="topbar__sep"></div>

    <div class="topbar__user">
      <div class="topbar__avatar">{{ (user?.username || 'U')[0].toUpperCase() }}</div>
      <div class="topbar__uinfo">
        <span class="topbar__uname">{{ user?.username }}</span>
        <span class="topbar__urole">{{ user?.role | slice:5 | lowercase }}</span>
      </div>
    </div>

    <button class="topbar__logout" (click)="logout()" [title]="'common.logout' | translate">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</header>

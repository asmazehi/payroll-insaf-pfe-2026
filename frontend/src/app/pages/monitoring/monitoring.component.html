<div class="page">
  <div class="page__header">
    <div class="page__title-group">
      <div class="page__eyebrow">
        <mat-icon>monitor_heart</mat-icon>
        <span>DEVOPS</span>
      </div>
      <h1 class="page__title">Monitoring <span class="accent">Infrastructure</span></h1>
      <p class="page__sub">Métriques temps réel — conteneurs Docker, CPU, mémoire, réseau</p>
    </div>
    <a class="open-btn" href="http://localhost:3000" target="_blank" rel="noopener">
      <mat-icon>open_in_new</mat-icon> Ouvrir Grafana
    </a>
  </div>

  <div class="grafana-wrapper">
    <iframe [src]="safeUrl" class="grafana-frame" frameborder="0" title="Grafana"></iframe>
  </div>
</div>

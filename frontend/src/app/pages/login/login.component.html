<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>INSAF</mat-card-title>
      <mat-card-subtitle>Payroll Intelligence Platform — CNI</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="username" autocomplete="username">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password">
        </mat-form-field>
        <div *ngIf="error" class="error-msg">{{ error }}</div>
        <button mat-raised-button color="primary" type="submit"
                [disabled]="loading || form.invalid" class="full-width">
          <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="page-wrapper">
  <h2 class="page-title">Payroll Forecast</h2>

  <div *ngIf="loading" class="center"><mat-spinner></mat-spinner></div>
  <div *ngIf="error"   class="error-msg">{{ error }}</div>

  <ng-container *ngIf="!loading && result">
    <div class="meta-row">
      <mat-card class="meta-card">
        <div class="meta-label">Model</div>
        <div class="meta-value">{{ result.model | uppercase }}</div>
      </mat-card>
      <mat-card class="meta-card">
        <div class="meta-label">Horizon</div>
        <div class="meta-value">{{ result.n_months }} months</div>
      </mat-card>
    </div>

    <mat-card class="chart-card">
      <mat-card-content>
        <canvas baseChart [data]="lineData" [options]="lineOptions" type="line"></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="table-card">
      <mat-card-content>
        <table mat-table [dataSource]="result.forecast" class="full-width">
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Month</th>
            <td mat-cell *matCellDef="let r">{{ r.date }}</td>
          </ng-container>
          <ng-container matColumnDef="predicted_netpay">
            <th mat-header-cell *matHeaderCellDef>Predicted Net Payroll (TND)</th>
            <td mat-cell *matCellDef="let r">{{ r.predicted_netpay | number:'1.0-0' }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="['date','predicted_netpay']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['date','predicted_netpay']"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </ng-container>
</div>

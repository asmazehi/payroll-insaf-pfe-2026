<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 170" width="640" height="170">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="60%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <linearGradient id="r1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="r2g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="r3g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#7DD3FC;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Prism body -->
  <polygon points="20,20 20,148 115,84" fill="url(#pg)" filter="url(#subtleglow)"/>
  <!-- Prism left edge highlight -->
  <line x1="20" y1="20" x2="20" y2="148" stroke="#BAE6FD" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Prism top edge highlight -->
  <line x1="20" y1="20" x2="115" y2="84" stroke="#BAE6FD" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Incoming ray (thin, elegant) -->
  <rect x="0" y="81" width="20" height="3.5" rx="1.75" fill="#BAE6FD" opacity="0.8"/>

  <!-- Refracted ray 1 — narrow, angles up sharply -->
  <polygon points="115,81 115,77 230,16 230,9" fill="url(#r1g)" filter="url(#glow)"/>
  <!-- Refracted ray 2 — straight through -->
  <polygon points="115,83 115,79 230,79 230,75" fill="url(#r2g)" filter="url(#glow)"/>
  <!-- Refracted ray 3 — angles down sharply -->
  <polygon points="115,85 115,89 230,152 230,159" fill="url(#r3g)" filter="url(#glow)"/>

  <!-- Separator line -->
  <line x1="248" y1="22" x2="248" y2="148" stroke="#CBD5E1" stroke-width="1" stroke-opacity="0.5"/>

  <!-- PRISM — bold, tight -->
  <text x="268" y="100"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="66"
        letter-spacing="5"
        fill="#0F172A">PRISM</text>

  <!-- Thin accent line under PRISM -->
  <rect x="268" y="108" width="320" height="2" rx="1" fill="url(#r3g)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="270" y="130"
        font-family="Arial, sans-serif"
        font-weight="300"
        font-size="11.5"
        letter-spacing="3.2"
        fill="#2563EB">INSAF · PAYROLL INTELLIGENCE PLATFORM</text>
</svg>
